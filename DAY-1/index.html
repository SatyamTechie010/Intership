<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Zerodha: Online brokerage platform for stock trading & investing
    </title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" as="script" href="index.js" />
  </head>
  <body>
    <header>
      <img
        class="img-logo"
        src="https://zerodha.com/static/images/logo.svg"
        alt=""
      />
      <nav class="nav">
        <a href="https://zerodha.com/open-account/" class="nav-link">SignUp</a>
        <a href="https://zerodha.com/open-account/" class="nav-link">About</a>
        <a href="https://zerodha.com/products/" class="nav-link">Project</a>
        <a href="https://zerodha.com/pricing/" class="nav-link">Pricing</a>
        <a href="https://support.zerodha.com/" class="nav-link">Support</a>
      </nav>
    </header>

    <img
      class="img-landing"
      src="https://zerodha.com/static/images/landing.svg"
      alt=""
    />
    <h1 class="inv">Invest in everything</h1>
    <p class="inv desc">
      Online platform to invest in stocks, derivatives, mutual funds, ETFs,
      bonds, and more.
    </p>
    <button class="btn">Signup for Free</button>
  </body>
</html>
